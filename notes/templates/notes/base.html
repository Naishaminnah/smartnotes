<html>
    <head>
        <title>
             Smart Notes
        </title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <style>
           .dark-mode {
                       background-color: #121212;
    color: white;
}

.dark-mode .card {
    background-color: #1e1e1e;
    color: white;
}

.dark-mode .navbar {
    background-color: #000 
}

.dark-mode input,
.dark-mode textarea {
    background-color: #2c2c2c;
    color: white;
    border: 1px solid #555;
}
</style>
    </head>
    <body id="body">
        <nav class="navbar navbar-dark bg-dark px-3">
        <div>
            {% if user.is_authenticated %}
             <a class= "btn btn-light"  href="{% url 'note_list' %}" >Home</a>
             <a class="btn btn-success"  href="{% url 'create_note_form' %}">Create</a>
             <a class="btn btn-danger"  href="{% url 'logout' %}">Logout</a>
             {% else %}
             <a class="btn btn-light"   href="{% url 'login' %}">Login</a>
             <a class="btn btn-primary"   href="{% url 'signup' %}">SignUp</a>
            {% endif %}
        </div>
        <button class="btn btn-secondary ms-2" onclick="toggleDarkMode()">🌙</button>
        </nav>

        <div>
            {% block content %}
            {% endblock %}
        </div>
        <script>
            function toggleDarkMode(){
                 let body = document.getElementById('body')
                 body.classList.toggle('dark-mode')

                 if (body.classList.contains('dark-mode')){
                    localStorage.setItem('theme','dark')
                 }
                 else{
                    localStorage.setItem('theme','light')
                 }

                 window.onload = function() {
                    let theme = localStorage.getItem('theme')
                    if (theme == 'dark'){
                        document.getElementById('body').classList.add('dark-mode')
                    }
                 }
                         
            }
                     
        </script>
    </body>
</html>
